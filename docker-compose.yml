services:

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  postgres_data: