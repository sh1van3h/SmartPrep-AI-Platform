{% extends "base.html" %}

{% block title %}
Login | SmartPrep AI Platform
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Welcome Back 👋
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

    <label class="form-label">
        Username
    </label>

    <input
        type="text"
        name="username"
        class="form-control"
        placeholder="Enter username"
        required>

</div>

<div class="mb-3">

    <label class="form-label">
        Password
    </label>

    <input
        type="password"
        name="password"
        class="form-control"
        placeholder="Enter password"
        required>

</div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary">
                            Login
                        </button>
                    </div>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Don't have an account?

                    <a href="{% url 'signup' %}">
                        Sign Up
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
