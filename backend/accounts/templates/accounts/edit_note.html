{% extends "base.html" %}

{% block title %}
Edit Note | SmartPrep AI Platform
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>
                        ✏️ Edit Note
                    </h2>

                    <a href="{% url 'note_detail' note.id %}"
                       class="btn btn-secondary">

                        ← Back

                    </a>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Note Title

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="title"
                            value="{{ note.title }}"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Note Content

                        </label>

                        <textarea
                            class="form-control"
                            name="content"
                            rows="12"
                            required>{{ note.content }}</textarea>

                    </div>

                    <div class="text-end">

                        <button
                            type="submit"
                            class="btn btn-primary">

                            💾 Update Note

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
