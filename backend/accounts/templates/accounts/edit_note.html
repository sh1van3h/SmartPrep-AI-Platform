<h1>Edit Note</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="title"
        value="{{ note.title }}"
    >

    <br><br>

    <textarea
        name="content"
    >{{ note.content }}</textarea>

    <br><br>

    <button>

        Update

    </button>

</form>
