{% extends "base.html" %}

{% block title %}
Add Note | SmartPrep AI Platform
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2>
                        ➕ Add Note
                    </h2>

                    <a href="{% url 'subject_detail' subject.id %}"
                       class="btn btn-secondary">

                        ← Back

                    </a>

                </div>

                <p class="text-muted">

                    Subject:
                    <strong>{{ subject.name }}</strong>

                </p>

                <hr>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Note Title

                        </label>

                        <input
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="Enter note title"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Note Content

                        </label>

                        <textarea
                            name="content"
                            rows="10"
                            class="form-control"
                            placeholder="Write your notes here..."
                            required></textarea>

                    </div>

                    <div class="d-flex justify-content-end">

                        <button
                            type="submit"
                            class="btn btn-success">

                            💾 Save Note

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
