{% extends "base.html" %}

{% block title %}
Quiz Result | SmartPrep AI Platform
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow text-center">

            <div class="card-body p-5">

                <h1 class="display-4">
                    🎉
                </h1>

                <h2 class="text-primary mb-4">
                    Quiz Completed!
                </h2>


                <hr>


                <h4 class="mb-3">
                    {{ note.title }}
                </h4>


                <p class="fs-4">
                    Your Score
                </p>


                <h1 class="display-5 fw-bold">
                    {{ score }} / {{ total }}
                </h1>


                <hr class="my-4">


                <div class="d-grid gap-3">

                    <a href="{% url 'quiz' note.id %}"
                       class="btn btn-primary">

                        🔄 Take Quiz Again

                    </a>


                    <a href="{% url 'note_detail' note.id %}"
                       class="btn btn-secondary">

                        ← Back to Note

                    </a>

                </div>


            </div>

        </div>

    </div>

</div>


{% endblock %}
