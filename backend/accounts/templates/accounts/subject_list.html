<!DOCTYPE html>
<html>
<head>
    <title>SmartPrep AI</title>
</head>
<body>

<h1>📚 SmartPrep AI</h1>

<hr>

<h2>My Subjects</h2>

<a href="{% url 'logout' %}">
    Logout
</a>

<hr>

<ul>

{% for subject in subjects %}

    <li>
    <a href="{% url 'subject_detail' subject.id %}">
        {{ subject.name }}
    </a>
</li>

{% endfor %}

</ul>

<hr>

<h2>Add New Subject</h2>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST" action="{% url 'add_subject' %}">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        placeholder="Enter subject name"
        required
    >

    <button type="submit">
        Add Subject
    </button>

</form>

</body>
</html>
