<h1>📄 AI Summary</h1>

<h2>{{ note.title }}</h2>

<hr>

{% if note.ai_summary %}

    <p>{{ note.ai_summary }}</p>

    <br>

    {% if note.summary_is_outdated %}

        <p>
            <strong>⚠️ Summary may be outdated.</strong>
        </p>

        <a href="{% url 'generate_summary' note.id %}">
            Regenerate Summary
        </a>

    {% endif %}

{% else %}

    <p>No summary generated yet.</p>

    <br>

    <a href="{% url 'generate_summary' note.id %}">
        Generate Summary
    </a>

{% endif %}

<hr>

<a href="{% url 'note_detail' note.id %}">
    ← Back to Note
</a>
