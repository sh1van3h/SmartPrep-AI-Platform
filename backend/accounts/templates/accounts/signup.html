<h1>Signup</h1>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Sign Up
    </button>

</form>

<p>
    Already have an account?
    <a href="{% url 'login' %}">
        Login
    </a>
</p>
